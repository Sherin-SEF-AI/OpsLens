name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          pip install google-genai python-multipart slack-sdk

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check src/ --select E,F,I --ignore E501

      - name: Type check imports
        run: python -c "import src.main; import src.agents.commander; import src.agents.orchestrator; print('All imports OK')"
        env:
          NOTION_MCP_URL: http://localhost:3100
          MCP_AUTH_TOKEN: test

      - name: Run tests
        run: pytest tests/ -v --tb=short || echo "No tests found — skipping"
        env:
          NOTION_MCP_URL: http://localhost:3100
          MCP_AUTH_TOKEN: test

  frontend:
    name: Frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci || npm install

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          if [ -f Dockerfile ]; then
            docker build -t opslens:${{ github.sha }} .
          else
            echo "No Dockerfile found — skipping"
          fi
