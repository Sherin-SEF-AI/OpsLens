apiVersion: v1
kind: Service
metadata:
  name: postgres-svc
  namespace: opslens
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: opslens
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app.kubernetes.io/name: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: opslens
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: opslens
spec:
  serviceName: postgres-svc
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: opslens
    spec:
      initContainers:
        - name: init-create-db
          image: postgres:16
          command:
            - /bin/bash
            - -c
            - |
              set -e
              until pg_isready -h localhost -p 5432 -U opslens 2>/dev/null; do
                echo "Waiting for PostgreSQL to start..."
                sleep 1
              done
              psql -h localhost -U opslens -tc "SELECT 1 FROM pg_database WHERE datname='opslens'" | grep -q 1 || \
                psql -h localhost -U opslens -c "CREATE DATABASE opslens"
              echo "Database 'opslens' is ready."
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: opslens-secrets
                  key: POSTGRES_PASSWORD
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: "opslens"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: opslens-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: "opslens"
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - opslens
                - -d
                - opslens
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - opslens
                - -d
                - opslens
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
