apiVersion: v1
kind: Service
metadata:
  name: opslens-svc
  namespace: opslens
  labels:
    app.kubernetes.io/name: opslens
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: opslens
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: opslens
    app.kubernetes.io/component: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: opslens-api
  namespace: opslens
  labels:
    app.kubernetes.io/name: opslens
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: opslens
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: opslens
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: opslens
        app.kubernetes.io/component: api
        app.kubernetes.io/part-of: opslens
    spec:
      serviceAccountName: default
      initContainers:
        - name: run-migrations
          image: ghcr.io/OWNER/opslens:latest
          command:
            - /bin/bash
            - -c
            - |
              echo "Running Alembic migrations..."
              alembic upgrade head
              echo "Migrations complete."
          envFrom:
            - configMapRef:
                name: opslens-config
            - secretRef:
                name: opslens-secrets
      containers:
        - name: opslens
          image: ghcr.io/OWNER/opslens:latest
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: opslens-config
            - secretRef:
                name: opslens-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12
