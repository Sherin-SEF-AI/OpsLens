apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: opslens-ingress
  namespace: opslens
  labels:
    app.kubernetes.io/name: opslens
    app.kubernetes.io/component: ingress
    app.kubernetes.io/part-of: opslens
  annotations:
    # Cert-manager TLS
    cert-manager.io/cluster-issuer: letsencrypt-prod
    # Nginx ingress controller settings
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    # Rate limiting
    nginx.ingress.kubernetes.io/limit-rps: "50"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    nginx.ingress.kubernetes.io/limit-connections: "20"
    # Request size limits
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # WebSocket support for real-time dashboard
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    # Security headers
    nginx.ingress.kubernetes.io/server-snippet: |
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header X-XSS-Protection "1; mode=block" always;
      add_header Referrer-Policy "strict-origin-when-cross-origin" always;
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - opslens.example.com
      secretName: opslens-tls
  rules:
    - host: opslens.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: opslens-svc
                port:
                  number: 8000
